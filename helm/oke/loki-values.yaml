# Loki — single-binary mode para OKE
#
# Persistence HABILITADA: Loki single-binary precisa de filesystem real
# em /var/loki (emptyDir não funciona — falha com read-only filesystem).
# 50GB é o mínimo do OCI Block Volume; cabe no Always Free (200GB total —
# 50GB Prom + 50GB Loki = 100GB usados, 100GB livres pra outros usos).

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  limits_config:
    retention_period: 48h
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 50Gi          # mínimo do OCI Block Volume

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

memcached:
  enabled: false
memcachedFrontend:
  enabled: false
memcachedIndexQueries:
  enabled: false
memcachedChunks:
  enabled: false

gateway:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

test:
  enabled: false
lokiCanary:
  enabled: false
