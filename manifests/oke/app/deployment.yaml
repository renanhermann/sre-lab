apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-simulator
  namespace: default
  labels:
    app: traffic-simulator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traffic-simulator
  template:
    metadata:
      labels:
        app: traffic-simulator
    spec:
      imagePullSecrets:
        - name: ocirsecret
      containers:
        - name: traffic-simulator
          image: sa-saopaulo-1.ocir.io/grrgpmpaymsm/sre-lab/traffic-simulator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
