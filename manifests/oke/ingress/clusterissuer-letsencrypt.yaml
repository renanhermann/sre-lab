# ClusterIssuers Let's Encrypt
#
# Dois issuers: staging pra validar setup (rate limit alto, cert NÃO confiável
# no browser) e prod pra cert real (rate limit baixo — 5 cert/semana por
# domínio raiz; nip.io conta como mesmo raiz!).
#
# Sempre testar com staging primeiro pra evitar rate limit no prod.

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: renanhermann@outlook.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: renanhermann@outlook.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
